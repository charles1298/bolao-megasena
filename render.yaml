services:
  - type: web
    name: bolao-megasena-api
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: TICKET_PRICE_BRL
        value: "30.00"
      - key: ADMIN_WHATSAPP
        value: "5517991571909"
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: ADMIN_TOTP_ISSUER
        value: BolaoMegaSena
      - key: LOG_LEVEL
        value: info
      - key: LOG_DIR
        value: ./logs
